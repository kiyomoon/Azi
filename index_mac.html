<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azi Reader Desktop</title>
    <style>
      :root {
        --bg: #eef1f0;
        --bg-soft: #f7f9f8;
        --panel: rgba(251, 252, 251, 0.9);
        --panel-strong: rgba(249, 250, 250, 0.96);
        --line: rgba(83, 94, 106, 0.12);
        --line-strong: rgba(83, 94, 106, 0.2);
        --text: #262b31;
        --muted: #6d757d;
        --accent: #6b7988;
        --quote: #ecf0f2;
        --code: #2f3a45;
        --shadow: 0 18px 44px rgba(49, 58, 68, 0.07);
        --radius: 24px;
        --ui-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
        --serif-font: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(172, 185, 196, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(155, 168, 181, 0.12), transparent 28%),
          linear-gradient(180deg, #f7f9f8 0%, var(--bg) 100%);
        color: var(--text);
        font-family: var(--ui-font);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .page {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        padding: 18px 0 40px;
      }

      .menu-button,
      .button,
      .button-ghost,
      .tiny-button {
        appearance: none;
        border-radius: 999px;
        cursor: pointer;
      }

      .menu-button,
      .button,
      .button-ghost {
        min-height: 40px;
        padding: 0 16px;
        border: 1px solid var(--line);
      }

      .menu-button {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 42;
        min-height: 38px;
        padding: 0 14px;
        background: rgba(252, 253, 253, 0.62);
        color: var(--text);
        box-shadow: 0 10px 26px rgba(49, 58, 68, 0.08);
        backdrop-filter: blur(14px);
      }

      .button {
        border-color: rgba(107, 121, 136, 0.24);
        background: linear-gradient(180deg, rgba(122, 138, 154, 0.14), rgba(107, 121, 136, 0.08));
        color: var(--text);
      }

      .button-ghost {
        background: rgba(252, 253, 253, 0.52);
        color: var(--muted);
      }

      .tiny-button {
        min-height: 32px;
        padding: 0 12px;
        border: 1px solid var(--line);
        background: rgba(252, 253, 253, 0.5);
        color: var(--text);
      }

      .tiny-button[data-tone="danger"] {
        color: #855864;
      }

      .menu-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(31, 37, 44, 0.1);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        z-index: 39;
      }

      body.menu-open .menu-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      .menu-panel {
        display: none;
        position: fixed;
        top: 62px;
        right: 16px;
        z-index: 40;
        width: min(380px, calc(100vw - 32px));
        max-height: min(78vh, 720px);
        overflow-x: hidden;
        overflow-y: auto;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      body.menu-open .menu-panel {
        display: grid;
        gap: 18px;
      }

      .menu-section {
        display: grid;
        gap: 12px;
        min-width: 0;
      }

      .menu-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.76rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .dropzone {
        border: 1px dashed var(--line-strong);
        border-radius: 18px;
        background: rgba(252, 253, 253, 0.54);
        padding: 16px;
        display: grid;
        gap: 12px;
        transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
      }

      .dropzone.active {
        border-color: rgba(107, 121, 136, 0.34);
        background: rgba(247, 250, 252, 0.9);
        transform: translateY(-1px);
      }

      .button-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .button-row > * {
        min-width: 0;
      }

      .dropzone .button-row {
        width: 100%;
      }

      .dropzone .button {
        width: 100%;
      }

      .file-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .meta-pill {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(252, 253, 253, 0.48);
        color: var(--muted);
        font-size: 0.82rem;
      }

      .library-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .library-title {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 600;
      }

      .library-list {
        display: grid;
        gap: 10px;
        max-height: 320px;
        overflow: auto;
        padding-right: 4px;
      }

      .library-empty {
        display: none;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .library-item {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(252, 253, 253, 0.46);
      }

      .library-item.current {
        border-color: rgba(107, 121, 136, 0.24);
        background: rgba(246, 249, 251, 0.92);
      }

      .library-item-head {
        display: grid;
        gap: 10px;
      }

      .library-item-title {
        margin: 0;
        font-size: 0.96rem;
        font-weight: 600;
        min-width: 0;
        word-break: break-word;
      }

      .library-item-meta {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.45;
        word-break: break-word;
      }

      .library-item-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .reader-panel {
        margin-top: 0;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .reader-shell {
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr);
        min-height: 72vh;
      }

      .reader-aside {
        padding: 22px 20px;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(252, 253, 253, 0.34), rgba(239, 243, 245, 0.22));
        display: grid;
        align-content: start;
        gap: 18px;
      }

      .aside-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .toc {
        display: grid;
        gap: 10px;
      }

      .toc a {
        color: var(--text);
        text-decoration: none;
        line-height: 1.5;
        font-size: 0.92rem;
      }

      .toc a:hover {
        color: var(--accent);
      }

      .reader-main {
        padding: 18px min(5vw, 56px) 44px;
        background: var(--panel-strong);
      }

      .prose {
        max-width: 780px;
        margin: 0 auto;
        font-family: var(--serif-font);
      }

      .prose > :first-child {
        margin-top: 0;
      }

      .prose h1,
      .prose h2,
      .prose h3,
      .prose h4 {
        font-family: var(--serif-font);
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #24292f;
      }

      .prose h1 {
        font-size: clamp(2.4rem, 4.3vw, 3.5rem);
        line-height: 0.98;
        margin: 0 0 20px;
      }

      .prose h2 {
        font-size: clamp(1.7rem, 2.4vw, 2.2rem);
        line-height: 1.04;
        margin: 48px 0 16px;
      }

      .prose h3 {
        font-size: 1.34rem;
        margin: 32px 0 12px;
      }

      .prose p,
      .prose li {
        color: #3d454d;
        font-size: 1.08rem;
        line-height: 1.84;
      }

      .prose p,
      .prose ul,
      .prose ol,
      .prose blockquote,
      .prose pre {
        margin: 0 0 18px;
      }

      .prose ul,
      .prose ol {
        padding-left: 1.4rem;
      }

      .prose li + li {
        margin-top: 10px;
      }

      .prose a {
        color: var(--accent);
        text-decoration-color: rgba(107, 121, 136, 0.34);
        text-underline-offset: 0.18em;
      }

      .prose strong {
        color: #23282e;
      }

      .prose hr {
        border: 0;
        height: 1px;
        background: var(--line);
        margin: 40px 0;
      }

      .prose blockquote {
        border-left: 3px solid rgba(107, 121, 136, 0.24);
        background: var(--quote);
        border-radius: 0 16px 16px 0;
        padding: 14px 16px;
      }

      .prose blockquote p:last-child {
        margin-bottom: 0;
      }

      .prose code {
        font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        background: rgba(47, 58, 69, 0.08);
        color: var(--code);
        border-radius: 8px;
        padding: 0.15em 0.36em;
      }

      .prose pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 18px;
        background: #1f252d;
        color: #eef2f7;
      }

      .prose pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .prose img {
        max-width: 100%;
        border-radius: 18px;
        display: block;
        margin: 24px auto;
      }

      .empty-state {
        display: none;
      }

      .empty-copy {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .hidden-input {
        display: none;
      }

      @media (max-width: 980px) {
        .reader-shell {
          grid-template-columns: 1fr;
        }

        .reader-aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }

      @media (max-width: 720px) {
        .page {
          width: min(100% - 20px, 1120px);
          padding: 18px 0 28px;
        }

        .reader-main,
        .reader-aside {
          padding-left: 20px;
          padding-right: 20px;
        }

        .prose h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <button class="menu-button" id="menuButton" type="button">Menu</button>
    <div class="menu-backdrop" id="menuBackdrop"></div>

    <div class="page">
      <section class="menu-panel">
        <section class="menu-section">
          <p class="menu-label">Open</p>
          <div class="dropzone" id="dropzone">
            <div class="button-row">
              <button class="button" id="pickFileButton" type="button">Choose markdown</button>
            </div>
            <div class="file-pills">
              <span class="meta-pill" id="fileNamePill">No file loaded</span>
              <span class="meta-pill" id="wordCountPill">0 words</span>
            </div>
            <input class="hidden-input" id="fileInput" type="file" accept=".md,.markdown,text/markdown" />
          </div>
        </section>

        <section class="menu-section">
          <div class="library-head">
            <p class="library-title">Saved locally</p>
            <button class="button-ghost" id="clearLibraryButton" type="button">Clear all</button>
          </div>
          <div class="library-list" id="libraryList"></div>
          <p class="library-empty" id="libraryEmpty">No saved files yet.</p>
        </section>
      </section>

      <section class="reader-panel">
        <div class="reader-shell">
          <aside class="reader-aside">
            <div>
              <p class="aside-label">Table of contents</p>
              <nav class="toc" id="toc">
                <p class="empty-copy">No headings yet.</p>
              </nav>
            </div>
          </aside>

          <main class="reader-main">
            <div class="empty-state" id="emptyState"></div>

            <article class="prose" id="prose" hidden></article>
          </main>
        </div>
      </section>
    </div>

    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

      const fileInput = document.getElementById("fileInput");
      const menuButton = document.getElementById("menuButton");
      const menuBackdrop = document.getElementById("menuBackdrop");
      const pickFileButton = document.getElementById("pickFileButton");
      const clearLibraryButton = document.getElementById("clearLibraryButton");
      const dropzone = document.getElementById("dropzone");
      const fileNamePill = document.getElementById("fileNamePill");
      const wordCountPill = document.getElementById("wordCountPill");
      const prose = document.getElementById("prose");
      const emptyState = document.getElementById("emptyState");
      const toc = document.getElementById("toc");
      const libraryList = document.getElementById("libraryList");
      const libraryEmpty = document.getElementById("libraryEmpty");
      const libraryStorageKey = "azi-reader-library";
      const lastDocumentStorageKey = "azi-reader-last-document";
      let currentDocumentId = null;

      marked.setOptions({
        breaks: false,
        gfm: true,
      });

      function getLibrary() {
        try {
          const parsed = JSON.parse(localStorage.getItem(libraryStorageKey) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function setLibrary(documents) {
        localStorage.setItem(libraryStorageKey, JSON.stringify(documents));
      }

      function setCurrentDocument(id) {
        currentDocumentId = id;

        if (id) {
          localStorage.setItem(lastDocumentStorageKey, id);
        } else {
          localStorage.removeItem(lastDocumentStorageKey);
        }
      }

      function formatUpdatedAt(value) {
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function countWords(text) {
        return text.trim() ? text.trim().split(/\s+/).length : 0;
      }

      function extractTitle(markdown, fallback) {
        const match = markdown.match(/^#\s+(.+)$/m);
        return match?.[1]?.trim() || fallback;
      }

      function slugify(text) {
        return text
          .toLowerCase()
          .trim()
          .replace(/[^\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
      }

      function setMenuOpen(enabled) {
        document.body.classList.toggle("menu-open", enabled);
      }

      function resetReaderState() {
        prose.hidden = true;
        prose.innerHTML = "";
        emptyState.hidden = true;
        fileNamePill.textContent = "No file loaded";
        wordCountPill.textContent = "0 words";
        toc.innerHTML = '<p class="empty-copy">No headings yet.</p>';
        document.title = "Azi Reader Desktop";
      }

      function buildToc() {
        const headings = Array.from(prose.querySelectorAll("h1, h2, h3"));

        if (!headings.length) {
          toc.innerHTML = '<p class="empty-copy">No headings yet.</p>';
          return;
        }

        toc.innerHTML = "";

        headings.forEach((heading) => {
          const id = slugify(heading.textContent || "section");
          heading.id = heading.id || id;

          const link = document.createElement("a");
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent || "Section";
          link.style.paddingLeft =
            heading.tagName === "H3" ? "16px" : heading.tagName === "H2" ? "8px" : "0";
          toc.appendChild(link);
        });
      }

      function renderLibrary() {
        const documents = getLibrary();
        libraryList.innerHTML = "";
        libraryEmpty.style.display = documents.length ? "none" : "block";
        clearLibraryButton.hidden = documents.length === 0;

        documents.forEach((documentItem) => {
          const card = document.createElement("article");
          card.className = "library-item";

          if (documentItem.id === currentDocumentId) {
            card.classList.add("current");
          }

          const head = document.createElement("div");
          head.className = "library-item-head";

          const metaWrap = document.createElement("div");
          const title = document.createElement("p");
          title.className = "library-item-title";
          title.textContent = documentItem.title || documentItem.fileName;

          const meta = document.createElement("p");
          meta.className = "library-item-meta";
          meta.textContent = `${documentItem.fileName} · ${documentItem.wordCount} words · ${formatUpdatedAt(documentItem.updatedAt)}`;

          metaWrap.append(title, meta);

          const actions = document.createElement("div");
          actions.className = "library-item-actions";

          const openButton = document.createElement("button");
          openButton.className = "tiny-button";
          openButton.type = "button";
          openButton.textContent = "Open";
          openButton.addEventListener("click", () => {
            renderMarkdown(documentItem.content, documentItem.fileName, documentItem.id, false);
            setMenuOpen(false);
          });

          const deleteButton = document.createElement("button");
          deleteButton.className = "tiny-button";
          deleteButton.type = "button";
          deleteButton.dataset.tone = "danger";
          deleteButton.textContent = "Delete";
          deleteButton.addEventListener("click", () => {
            deleteDocument(documentItem.id);
          });

          actions.append(openButton, deleteButton);
          head.append(metaWrap, actions);
          card.append(head);
          libraryList.append(card);
        });
      }

      function upsertDocument(fileName, markdown, preferredId = null) {
        const documents = getLibrary();
        const existingIndex = documents.findIndex((documentItem) => {
          if (preferredId && documentItem.id === preferredId) {
            return true;
          }

          return documentItem.fileName === fileName && documentItem.content === markdown;
        });

        const title = extractTitle(markdown, fileName || "Untitled document");
        const wordCount = countWords(markdown);
        const nextDocument = {
          id: preferredId || documents[existingIndex]?.id || `doc-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          fileName: fileName || "Untitled document",
          title,
          content: markdown,
          wordCount,
          updatedAt: new Date().toISOString(),
        };

        if (existingIndex >= 0) {
          documents.splice(existingIndex, 1);
        }

        documents.unshift(nextDocument);
        setLibrary(documents.slice(0, 24));
        setCurrentDocument(nextDocument.id);
        renderLibrary();
        return nextDocument.id;
      }

      function deleteDocument(documentId) {
        const nextDocuments = getLibrary().filter((documentItem) => documentItem.id !== documentId);
        setLibrary(nextDocuments);

        if (currentDocumentId === documentId) {
          setCurrentDocument(null);
          resetReaderState();
        }

        renderLibrary();
      }

      function renderMarkdown(markdown, fileName, documentId = null, shouldPersist = true) {
        const html = marked.parse(markdown);
        prose.innerHTML = html;
        prose.hidden = false;
        emptyState.hidden = true;

        const title = extractTitle(markdown, fileName || "Untitled document");
        const wordCount = `${countWords(markdown)} words`;
        fileNamePill.textContent = fileName || "Untitled document";
        wordCountPill.textContent = wordCount;
        buildToc();
        document.title = `${title} · Azi Reader`;

        if (shouldPersist) {
          setCurrentDocument(upsertDocument(fileName || "Untitled document", markdown, documentId));
        } else {
          setCurrentDocument(documentId);
          renderLibrary();
        }
      }

      async function readFile(file) {
        const text = await file.text();
        renderMarkdown(text, file.name);
      }

      menuButton.addEventListener("click", () => {
        setMenuOpen(!document.body.classList.contains("menu-open"));
      });

      menuBackdrop.addEventListener("click", () => {
        setMenuOpen(false);
      });

      pickFileButton.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];

        if (!file) {
          return;
        }

        await readFile(file);
        fileInput.value = "";
        setMenuOpen(false);
      });

      clearLibraryButton.addEventListener("click", () => {
        setLibrary([]);
        setCurrentDocument(null);
        resetReaderState();
        renderLibrary();
      });

      ["dragenter", "dragover"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.add("active");
        });
      });

      ["dragleave", "dragend", "drop"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.remove("active");
        });
      });

      dropzone.addEventListener("drop", async (event) => {
        const file = event.dataTransfer?.files?.[0];

        if (!file) {
          return;
        }

        await readFile(file);
        setMenuOpen(false);
      });

      resetReaderState();
      renderLibrary();

      const lastDocumentId = localStorage.getItem(lastDocumentStorageKey);
      const lastDocument = getLibrary().find((documentItem) => documentItem.id === lastDocumentId);

      if (lastDocument) {
        renderMarkdown(lastDocument.content, lastDocument.fileName, lastDocument.id, false);
      }
    </script>
  </body>
</html>
