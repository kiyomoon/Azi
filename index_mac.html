<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azi Markdown Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=Crimson+Pro:wght@400;500;600&family=Manrope:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f1e8;
        --bg-soft: #fbf8f2;
        --panel: rgba(255, 252, 245, 0.8);
        --panel-strong: rgba(255, 253, 248, 0.94);
        --line: rgba(86, 73, 58, 0.14);
        --line-strong: rgba(86, 73, 58, 0.22);
        --text: #2b241d;
        --muted: #746555;
        --accent: #8c5c3e;
        --accent-soft: rgba(140, 92, 62, 0.1);
        --quote: #ede4d7;
        --code: #2f3a45;
        --shadow: 0 18px 45px rgba(62, 48, 35, 0.08);
        --radius: 24px;
        --prose-font: "Manrope", system-ui, sans-serif;
        --prose-size: 1.04rem;
        --prose-line-height: 1.9;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(196, 174, 147, 0.2), transparent 28%),
          radial-gradient(circle at bottom right, rgba(146, 122, 102, 0.14), transparent 28%),
          linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
        color: var(--text);
        font-family: "Manrope", system-ui, sans-serif;
      }

      body.font-iowan {
        --prose-font: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        --prose-size: 1.1rem;
        --prose-line-height: 1.82;
      }

      body.font-crimson {
        --prose-font: "Crimson Pro", Georgia, serif;
        --prose-size: 1.12rem;
        --prose-line-height: 1.86;
      }

      body.font-source {
        --prose-font: "Source Serif 4", Georgia, serif;
        --prose-size: 1.12rem;
        --prose-line-height: 1.84;
      }

      .page {
        width: min(1160px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      body.reading-mode .page {
        width: min(920px, calc(100% - 28px));
        padding-top: 20px;
      }

      body.reading-mode.zen-mode .page {
        width: min(820px, calc(100% - 24px));
        padding-top: 14px;
        padding-bottom: 28px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(320px, 0.75fr);
        gap: 24px;
        align-items: stretch;
      }

      body.reading-mode .hero {
        display: none;
      }

      .hero-copy,
      .upload-panel,
      .reader-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .hero-copy {
        padding: 32px 34px;
        display: grid;
        gap: 18px;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .hero h1 {
        margin: 0;
        font-family: "Newsreader", Georgia, serif;
        font-size: clamp(1.8rem, 3.2vw, 2.8rem);
        line-height: 1;
        font-weight: 500;
        max-width: 12ch;
      }

      .upload-panel {
        padding: 24px;
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .upload-head h2 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
      }

      .dropzone {
        border: 1px dashed var(--line-strong);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.52);
        padding: 28px 22px;
        display: grid;
        gap: 14px;
        justify-items: start;
        transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
      }

      .dropzone.active {
        border-color: rgba(140, 92, 62, 0.4);
        background: rgba(255, 251, 246, 0.9);
        transform: translateY(-1px);
      }

      .button-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .button,
      .button-ghost {
        appearance: none;
        border-radius: 999px;
        min-height: 44px;
        padding: 0 18px;
        font: inherit;
        cursor: pointer;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease, color 180ms ease;
      }

      .button {
        border: 1px solid rgba(140, 92, 62, 0.22);
        background: linear-gradient(180deg, rgba(161, 118, 88, 0.16), rgba(140, 92, 62, 0.08));
        color: var(--text);
      }

      .button-ghost {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.42);
        color: var(--muted);
      }

      .button:hover,
      .button-ghost:hover {
        transform: translateY(-1px);
      }

      .meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .meta-pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.42);
        color: var(--muted);
        font-size: 0.84rem;
      }

      .reader-panel {
        margin-top: 24px;
        overflow: hidden;
      }

      body.reading-mode .reader-panel {
        margin-top: 0;
        background: transparent;
        box-shadow: none;
        border-color: transparent;
      }

      body.reading-mode.zen-mode .reader-panel {
        border-color: transparent;
        box-shadow: none;
        background: transparent;
      }

      .reader-shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 70vh;
      }

      body.reading-mode .reader-shell {
        display: block;
        min-height: auto;
      }

      .reader-aside {
        border-right: 1px solid var(--line);
        padding: 26px 22px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), rgba(248, 241, 232, 0.2));
        display: grid;
        align-content: start;
        gap: 18px;
      }

      body.reading-mode .reader-aside {
        display: none;
      }

      .reader-aside h3,
      .reader-aside h4 {
        margin: 0;
      }

      .reader-aside h3 {
        font-size: 1rem;
      }

      .reader-aside h4 {
        color: var(--muted);
        font-size: 0.74rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .reader-aside p {
        margin: 0;
        color: var(--muted);
        line-height: 1.65;
        font-size: 0.94rem;
      }

      .toc {
        display: grid;
        gap: 10px;
      }

      .toc a {
        color: var(--text);
        text-decoration: none;
        line-height: 1.5;
        font-size: 0.95rem;
      }

      .toc a:hover {
        color: var(--accent);
      }

      .reader-main {
        padding: 44px min(6vw, 64px) 56px;
        background: var(--panel-strong);
      }

      body.reading-mode .reader-main {
        padding: 10px 0 20px;
        background: transparent;
      }

      body.reading-mode.zen-mode .reader-main {
        padding-top: 0;
      }

      .reader-toolbar {
        display: none;
      }

      body.reading-mode .reader-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.78);
        box-shadow: 0 10px 24px rgba(62, 48, 35, 0.05);
        backdrop-filter: blur(14px);
      }

      body.reading-mode.zen-mode .reader-toolbar {
        display: none;
      }

      .reader-toolbar-main,
      .reader-toolbar-actions {
        display: flex;
        align-items: center;
        gap: 10px 12px;
        flex-wrap: wrap;
      }

      .zen-dock {
        position: fixed;
        top: 16px;
        right: 16px;
        display: none;
        align-items: center;
        gap: 10px 12px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 252, 245, 0.82);
        box-shadow: 0 12px 30px rgba(62, 48, 35, 0.08);
        backdrop-filter: blur(14px);
        z-index: 30;
      }

      body.reading-mode.zen-mode .zen-dock {
        display: inline-flex;
      }

      .empty-state {
        min-height: 60vh;
        display: grid;
        place-items: center;
        text-align: center;
      }

      .empty-copy {
        display: grid;
        gap: 14px;
      }

      .prose {
        max-width: 760px;
        margin: 0 auto;
        font-family: var(--prose-font);
      }

      body.reading-mode .prose {
        max-width: 780px;
      }

      body.reading-mode.zen-mode .prose {
        max-width: 800px;
      }

      .prose > :first-child {
        margin-top: 0;
      }

      .prose h1,
      .prose h2,
      .prose h3,
      .prose h4 {
        font-family: "Newsreader", Georgia, serif;
        font-weight: 500;
        letter-spacing: -0.02em;
        color: #241d17;
      }

      .prose h1 {
        font-size: clamp(2.6rem, 5vw, 4rem);
        line-height: 0.96;
        margin: 0 0 24px;
      }

      .prose h2 {
        font-size: clamp(1.9rem, 3vw, 2.5rem);
        line-height: 1.02;
        margin: 56px 0 18px;
      }

      .prose h3 {
        font-size: 1.45rem;
        margin: 36px 0 14px;
      }

      .prose p,
      .prose li {
        color: #40362c;
        font-size: var(--prose-size);
        line-height: var(--prose-line-height);
      }

      .prose p,
      .prose ul,
      .prose ol,
      .prose blockquote,
      .prose pre {
        margin: 0 0 18px;
      }

      .prose ul,
      .prose ol {
        padding-left: 1.4rem;
      }

      .prose li + li {
        margin-top: 10px;
      }

      .prose a {
        color: var(--accent);
        text-decoration-color: rgba(140, 92, 62, 0.35);
        text-underline-offset: 0.18em;
      }

      .prose strong {
        color: #231c16;
      }

      .prose hr {
        border: 0;
        height: 1px;
        background: var(--line);
        margin: 42px 0;
      }

      .prose blockquote {
        border-left: 3px solid rgba(140, 92, 62, 0.24);
        background: var(--quote);
        padding: 16px 18px;
        border-radius: 0 18px 18px 0;
      }

      .prose blockquote p:last-child {
        margin-bottom: 0;
      }

      .prose code {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.9em;
        background: rgba(47, 58, 69, 0.08);
        color: var(--code);
        border-radius: 8px;
        padding: 0.16em 0.36em;
      }

      .prose pre {
        overflow-x: auto;
        padding: 18px 18px;
        border-radius: 18px;
        background: #1f252d;
        color: #eef2f7;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      }

      .prose pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .prose img {
        max-width: 100%;
        border-radius: 20px;
        display: block;
        margin: 26px auto;
      }

      .hidden-input {
        display: none;
      }

      .toolbar-title {
        font-family: "Newsreader", Georgia, serif;
        font-size: 1.05rem;
        font-weight: 500;
        color: var(--text);
      }

      .library-panel {
        display: grid;
        gap: 12px;
        padding-top: 4px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .panel-head h3 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
      }

      .library-list {
        display: grid;
        gap: 10px;
      }

      .library-empty {
        display: none;
      }

      .library-item {
        display: grid;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.44);
      }

      .library-item.current {
        border-color: rgba(140, 92, 62, 0.28);
        background: rgba(255, 251, 246, 0.82);
      }

      .library-item-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .library-item-title {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 600;
      }

      .library-item-meta {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.5;
      }

      .library-item-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .tiny-button {
        appearance: none;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.52);
        color: var(--text);
        border-radius: 999px;
        min-height: 34px;
        padding: 0 12px;
        font: inherit;
        cursor: pointer;
      }

      .tiny-button[data-tone="danger"] {
        color: #7b4332;
      }

      .segmented {
        display: inline-flex;
        align-items: center;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.48);
        gap: 4px;
      }

      .segment-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        min-height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        font: inherit;
        cursor: pointer;
        transition: background 180ms ease, color 180ms ease;
      }

      .segment-button.active {
        background: rgba(140, 92, 62, 0.11);
        color: var(--text);
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .reader-shell {
          grid-template-columns: 1fr;
        }

        .reader-aside {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        body.reading-mode .reader-toolbar {
          padding: 12px 14px;
        }

        .zen-dock {
          top: auto;
          right: 14px;
          bottom: 14px;
          left: 14px;
          justify-content: space-between;
        }
      }

      @media (max-width: 720px) {
        .page {
          width: min(100% - 20px, 1160px);
          padding: 18px 0 28px;
        }

        .hero-copy,
        .upload-panel,
        .reader-main,
        .reader-aside {
          padding-left: 20px;
          padding-right: 20px;
        }

        .reader-main {
          padding-top: 30px;
          padding-bottom: 34px;
        }

        body.reading-mode .reader-main {
          padding-top: 8px;
        }

        .prose h1 {
          font-size: 2.3rem;
        }

        .prose h2 {
          font-size: 1.7rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Azi Reader</p>
          <h1>Markdown Reader</h1>
        </div>

        <aside class="upload-panel">
          <div class="upload-head">
            <h2>Open a file</h2>
          </div>

          <div class="dropzone" id="dropzone">
            <div class="button-row">
              <button class="button" id="pickFileButton" type="button">Choose markdown</button>
              <button class="button-ghost" id="loadSampleButton" type="button">Load sample</button>
            </div>
            <input class="hidden-input" id="fileInput" type="file" accept=".md,.markdown,text/markdown" />
          </div>

          <div class="meta">
            <span class="meta-pill" id="fileNamePill">No file loaded</span>
            <span class="meta-pill" id="wordCountPill">0 words</span>
          </div>

          <section class="library-panel">
            <div class="panel-head">
              <h3>Saved locally</h3>
              <button class="button-ghost" id="clearLibraryButton" type="button">Clear all</button>
            </div>
            <div class="library-list" id="libraryList"></div>
            <p class="library-empty" id="libraryEmpty"></p>
          </section>
        </aside>
      </section>

      <section class="reader-panel">
        <div class="reader-shell">
          <aside class="reader-aside">
            <div>
              <h4>Current file</h4>
              <h3 id="asideTitle">Waiting for a markdown file</h3>
            </div>

            <div>
              <h4>Table of contents</h4>
              <nav class="toc" id="toc">
                <p>No headings yet.</p>
              </nav>
            </div>
          </aside>

          <main class="reader-main">
            <div class="reader-toolbar" id="readerToolbar">
              <div class="reader-toolbar-main">
                <span class="toolbar-title" id="toolbarTitle">Untitled document</span>
                <span class="meta-pill" id="toolbarWordCount">0 words</span>
              </div>
              <div class="reader-toolbar-actions">
                <div class="segmented" aria-label="Body font">
                  <button class="segment-button" id="sansModeButton" type="button">Sans</button>
                  <button class="segment-button" id="iowanModeButton" type="button">Iowan</button>
                  <button class="segment-button" id="crimsonModeButton" type="button">Crimson</button>
                  <button class="segment-button" id="sourceModeButton" type="button">Source</button>
                </div>
                <button class="button-ghost" id="zenModeButton" type="button">Zen mode</button>
                <button class="button-ghost" id="changeFileButton" type="button">Change file</button>
                <button class="button-ghost" id="exitReadingButton" type="button">Show tools</button>
              </div>
            </div>

            <div class="zen-dock" id="zenDock">
              <div class="segmented" aria-label="Body font">
                <button class="segment-button" id="zenSansModeButton" type="button">Sans</button>
                <button class="segment-button" id="zenIowanModeButton" type="button">Iowan</button>
                <button class="segment-button" id="zenCrimsonModeButton" type="button">Crimson</button>
                <button class="segment-button" id="zenSourceModeButton" type="button">Source</button>
              </div>
              <button class="button-ghost" id="exitZenButton" type="button">Exit Zen</button>
            </div>

            <div class="empty-state" id="emptyState">
              <div class="empty-copy">
                <button class="button" id="emptyPickFileButton" type="button">Choose markdown</button>
              </div>
            </div>

            <article class="prose" id="prose" hidden></article>
          </main>
        </div>
      </section>
    </div>

    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

      const fileInput = document.getElementById("fileInput");
      const pickFileButton = document.getElementById("pickFileButton");
      const emptyPickFileButton = document.getElementById("emptyPickFileButton");
      const loadSampleButton = document.getElementById("loadSampleButton");
      const changeFileButton = document.getElementById("changeFileButton");
      const exitReadingButton = document.getElementById("exitReadingButton");
      const zenModeButton = document.getElementById("zenModeButton");
      const exitZenButton = document.getElementById("exitZenButton");
      const sansModeButton = document.getElementById("sansModeButton");
      const iowanModeButton = document.getElementById("iowanModeButton");
      const crimsonModeButton = document.getElementById("crimsonModeButton");
      const sourceModeButton = document.getElementById("sourceModeButton");
      const zenSansModeButton = document.getElementById("zenSansModeButton");
      const zenIowanModeButton = document.getElementById("zenIowanModeButton");
      const zenCrimsonModeButton = document.getElementById("zenCrimsonModeButton");
      const zenSourceModeButton = document.getElementById("zenSourceModeButton");
      const dropzone = document.getElementById("dropzone");
      const fileNamePill = document.getElementById("fileNamePill");
      const wordCountPill = document.getElementById("wordCountPill");
      const toolbarTitle = document.getElementById("toolbarTitle");
      const toolbarWordCount = document.getElementById("toolbarWordCount");
      const prose = document.getElementById("prose");
      const emptyState = document.getElementById("emptyState");
      const asideTitle = document.getElementById("asideTitle");
      const toc = document.getElementById("toc");
      const libraryList = document.getElementById("libraryList");
      const libraryEmpty = document.getElementById("libraryEmpty");
      const clearLibraryButton = document.getElementById("clearLibraryButton");
      const storedFontMode = localStorage.getItem("azi-reader-font");
      const storedZenMode = localStorage.getItem("azi-reader-zen");
      const libraryStorageKey = "azi-reader-library";
      const lastDocumentStorageKey = "azi-reader-last-document";
      let currentDocumentId = null;

      const sampleMarkdown = `# A Quiet Reader

This is a small markdown reader made for files that deserve a calmer page.

## Why it exists

Sometimes a raw editor preview is too mechanical.
Sometimes a document wants more air, stronger hierarchy, and a gentler reading rhythm.

## What it does

- opens one local markdown file
- renders it directly in the browser
- keeps the interface quiet

> The page should not perform. It should hold the writing without getting in the way.

## A short code block

\`\`\`ts
type ReaderState = {
  fileName: string;
  content: string;
};
\`\`\`

## Last note

If the file is well written, the UI should step back and let the structure become visible.`;

      marked.setOptions({
        breaks: false,
        gfm: true,
      });

      function getLibrary() {
        try {
          const parsed = JSON.parse(localStorage.getItem(libraryStorageKey) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function setLibrary(documents) {
        localStorage.setItem(libraryStorageKey, JSON.stringify(documents));
      }

      function formatUpdatedAt(value) {
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function setCurrentDocument(id) {
        currentDocumentId = id;

        if (id) {
          localStorage.setItem(lastDocumentStorageKey, id);
        } else {
          localStorage.removeItem(lastDocumentStorageKey);
        }
      }

      function renderLibrary() {
        const documents = getLibrary();
        libraryList.innerHTML = "";
        libraryEmpty.hidden = documents.length > 0;
        clearLibraryButton.hidden = documents.length === 0;

        documents.forEach((documentItem) => {
          const card = document.createElement("article");
          card.className = "library-item";

          if (documentItem.id === currentDocumentId) {
            card.classList.add("current");
          }

          const head = document.createElement("div");
          head.className = "library-item-head";

          const metaWrap = document.createElement("div");
          const title = document.createElement("p");
          title.className = "library-item-title";
          title.textContent = documentItem.title || documentItem.fileName;

          const meta = document.createElement("p");
          meta.className = "library-item-meta";
          meta.textContent = `${documentItem.fileName} · ${documentItem.wordCount} words · ${formatUpdatedAt(documentItem.updatedAt)}`;

          metaWrap.append(title, meta);

          const actions = document.createElement("div");
          actions.className = "library-item-actions";

          const openButton = document.createElement("button");
          openButton.className = "tiny-button";
          openButton.type = "button";
          openButton.textContent = "Open";
          openButton.addEventListener("click", () => {
            renderMarkdown(documentItem.content, documentItem.fileName, documentItem.id, false);
          });

          const deleteButton = document.createElement("button");
          deleteButton.className = "tiny-button";
          deleteButton.type = "button";
          deleteButton.dataset.tone = "danger";
          deleteButton.textContent = "Delete";
          deleteButton.addEventListener("click", () => {
            deleteDocument(documentItem.id);
          });

          actions.append(openButton, deleteButton);
          head.append(metaWrap, actions);
          card.append(head);
          libraryList.append(card);
        });
      }

      function upsertDocument(fileName, markdown, preferredId = null) {
        const documents = getLibrary();
        const existingIndex = documents.findIndex((documentItem) => {
          if (preferredId && documentItem.id === preferredId) {
            return true;
          }

          return documentItem.fileName === fileName && documentItem.content === markdown;
        });

        const title = extractTitle(markdown, fileName || "Untitled document");
        const wordCount = countWords(markdown);
        const nextDocument = {
          id: preferredId || documents[existingIndex]?.id || `doc-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          fileName: fileName || "Untitled document",
          title,
          content: markdown,
          wordCount,
          updatedAt: new Date().toISOString(),
        };

        if (existingIndex >= 0) {
          documents.splice(existingIndex, 1);
        }

        documents.unshift(nextDocument);
        setLibrary(documents.slice(0, 24));
        setCurrentDocument(nextDocument.id);
        renderLibrary();
        return nextDocument.id;
      }

      function deleteDocument(documentId) {
        const nextDocuments = getLibrary().filter((documentItem) => documentItem.id !== documentId);
        setLibrary(nextDocuments);

        if (currentDocumentId === documentId) {
          setCurrentDocument(null);
        }

        renderLibrary();
      }

      function syncFontButtons(mode) {
        const groups = {
          sans: [sansModeButton, zenSansModeButton],
          iowan: [iowanModeButton, zenIowanModeButton],
          crimson: [crimsonModeButton, zenCrimsonModeButton],
          source: [sourceModeButton, zenSourceModeButton],
        };

        Object.entries(groups).forEach(([key, buttons]) => {
          buttons.forEach((button) => {
            button.classList.toggle("active", mode === key);
          });
        });
      }

      function setFontMode(mode) {
        document.body.classList.remove("font-iowan", "font-crimson", "font-source");

        if (mode === "iowan") {
          document.body.classList.add("font-iowan");
        } else if (mode === "crimson") {
          document.body.classList.add("font-crimson");
        } else if (mode === "source") {
          document.body.classList.add("font-source");
        } else {
          mode = "sans";
        }

        localStorage.setItem("azi-reader-font", mode);
        syncFontButtons(mode);
      }

      function setZenMode(enabled) {
        document.body.classList.toggle("zen-mode", enabled);
        localStorage.setItem("azi-reader-zen", enabled ? "1" : "0");
      }

      function slugify(text) {
        return text
          .toLowerCase()
          .trim()
          .replace(/[^\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
      }

      function countWords(text) {
        return text.trim() ? text.trim().split(/\s+/).length : 0;
      }

      function extractTitle(markdown, fallback) {
        const match = markdown.match(/^#\s+(.+)$/m);
        return match?.[1]?.trim() || fallback;
      }

      function buildToc() {
        const headings = Array.from(prose.querySelectorAll("h1, h2, h3"));

        if (!headings.length) {
          toc.innerHTML = "<p>No headings yet.</p>";
          return;
        }

        toc.innerHTML = "";

        headings.forEach((heading) => {
          const id = slugify(heading.textContent || "section");
          heading.id = heading.id || id;

          const link = document.createElement("a");
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent || "Section";
          link.style.paddingLeft =
            heading.tagName === "H3" ? "16px" : heading.tagName === "H2" ? "8px" : "0";
          toc.appendChild(link);
        });
      }

      function renderMarkdown(markdown, fileName, documentId = null, shouldPersist = true) {
        const html = marked.parse(markdown);
        prose.innerHTML = html;
        prose.hidden = false;
        emptyState.hidden = true;
        document.body.classList.add("reading-mode");

        const title = extractTitle(markdown, fileName || "Untitled document");
        const wordCount = `${countWords(markdown)} words`;
        asideTitle.textContent = title;
        fileNamePill.textContent = fileName || "Untitled document";
        wordCountPill.textContent = wordCount;
        toolbarTitle.textContent = title;
        toolbarWordCount.textContent = wordCount;
        buildToc();

        if (shouldPersist) {
          setCurrentDocument(upsertDocument(fileName || "Untitled document", markdown, documentId));
        } else {
          setCurrentDocument(documentId);
          renderLibrary();
        }
      }

      async function readFile(file) {
        const text = await file.text();
        renderMarkdown(text, file.name);
      }

      pickFileButton.addEventListener("click", () => fileInput.click());
      emptyPickFileButton.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) {
          return;
        }

        await readFile(file);
        fileInput.value = "";
      });

      loadSampleButton.addEventListener("click", () => {
        renderMarkdown(sampleMarkdown, "sample.md");
      });

      changeFileButton.addEventListener("click", () => fileInput.click());
      exitReadingButton.addEventListener("click", () => {
        document.body.classList.remove("reading-mode");
      });
      zenModeButton.addEventListener("click", () => setZenMode(true));
      exitZenButton.addEventListener("click", () => setZenMode(false));
      sansModeButton.addEventListener("click", () => setFontMode("sans"));
      iowanModeButton.addEventListener("click", () => setFontMode("iowan"));
      crimsonModeButton.addEventListener("click", () => setFontMode("crimson"));
      sourceModeButton.addEventListener("click", () => setFontMode("source"));
      zenSansModeButton.addEventListener("click", () => setFontMode("sans"));
      zenIowanModeButton.addEventListener("click", () => setFontMode("iowan"));
      zenCrimsonModeButton.addEventListener("click", () => setFontMode("crimson"));
      zenSourceModeButton.addEventListener("click", () => setFontMode("source"));

      ["dragenter", "dragover"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.add("active");
        });
      });

      ["dragleave", "dragend", "drop"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.remove("active");
        });
      });

      dropzone.addEventListener("drop", async (event) => {
        const file = event.dataTransfer?.files?.[0];

        if (!file) {
          return;
        }

        await readFile(file);
      });

      clearLibraryButton.addEventListener("click", () => {
        setLibrary([]);
        setCurrentDocument(null);
        renderLibrary();
      });

      const normalizedStoredFontMode =
        storedFontMode === "serif"
          ? "source"
          : ["sans", "iowan", "crimson", "source"].includes(storedFontMode)
            ? storedFontMode
            : "sans";
      setFontMode(normalizedStoredFontMode);
      setZenMode(storedZenMode === "1");
      renderLibrary();

      const lastDocumentId = localStorage.getItem(lastDocumentStorageKey);
      const lastDocument = getLibrary().find((documentItem) => documentItem.id === lastDocumentId);

      if (lastDocument) {
        renderMarkdown(lastDocument.content, lastDocument.fileName, lastDocument.id, false);
      }
    </script>
  </body>
</html>
