<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Azi Reader</title>
    <style>
      :root {
        --bg: #eef1f0;
        --bg-soft: #f7f9f8;
        --surface: rgba(251, 252, 251, 0.9);
        --surface-strong: rgba(249, 250, 250, 0.96);
        --line: rgba(83, 94, 106, 0.12);
        --line-strong: rgba(83, 94, 106, 0.2);
        --text: #262b31;
        --muted: #6d757d;
        --accent: #6b7988;
        --quote: #ecf0f2;
        --code: #2f3a45;
        --shadow: 0 18px 44px rgba(49, 58, 68, 0.07);
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        --font-serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        -webkit-text-size-adjust: 100%;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(172, 185, 196, 0.16), transparent 34%),
          radial-gradient(circle at bottom right, rgba(155, 168, 181, 0.12), transparent 30%),
          linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
        color: var(--text);
        font-family: var(--font-ui);
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        padding: calc(var(--safe-top) + 18px) 0 calc(var(--safe-bottom) + 92px);
      }

      .main {
        padding: 0 18px;
      }

      .article {
        min-height: calc(100vh - var(--safe-top) - var(--safe-bottom) - 116px);
        max-width: 42rem;
        margin: 0 auto;
      }

      .prose {
        font-family: var(--font-serif);
        padding: 18px 4px 28px;
      }

      .prose[hidden] {
        display: none;
      }

      .prose > :first-child {
        margin-top: 0;
      }

      .prose h1,
      .prose h2,
      .prose h3,
      .prose h4 {
        font-family: var(--font-serif);
        color: var(--text);
        font-weight: 500;
        letter-spacing: -0.02em;
        scroll-margin-top: 28px;
      }

      .prose h1 {
        font-size: 1.82rem;
        line-height: 1.04;
        margin: 0 0 18px;
      }

      .prose h2 {
        font-size: 1.34rem;
        line-height: 1.08;
        margin: 34px 0 14px;
      }

      .prose h3 {
        font-size: 1.1rem;
        margin: 24px 0 10px;
      }

      .prose p,
      .prose li {
        font-size: 1.125rem;
        line-height: 1.74;
        color: #3d444c;
        letter-spacing: -0.003em;
      }

      .prose p,
      .prose ul,
      .prose ol,
      .prose blockquote,
      .prose pre {
        margin: 0 0 16px;
      }

      .prose ul,
      .prose ol {
        padding-left: 1.28rem;
      }

      .prose li + li {
        margin-top: 8px;
      }

      .prose a {
        color: var(--accent);
        text-decoration-color: rgba(107, 121, 136, 0.32);
        text-underline-offset: 0.18em;
      }

      .prose strong {
        color: #242a30;
      }

      .prose hr {
        border: 0;
        height: 1px;
        background: var(--line);
        margin: 30px 0;
      }

      .prose blockquote {
        border-left: 3px solid rgba(107, 121, 136, 0.24);
        border-radius: 0 14px 14px 0;
        background: var(--quote);
        padding: 12px 14px;
      }

      .prose code {
        font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        background: rgba(47, 58, 69, 0.08);
        color: var(--code);
        border-radius: 8px;
        padding: 0.14em 0.36em;
      }

      .prose pre {
        overflow-x: auto;
        padding: 14px;
        border-radius: 16px;
        background: #1f252d;
        color: #eef2f7;
      }

      .prose pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .prose img {
        max-width: 100%;
        display: block;
        margin: 20px auto;
        border-radius: 16px;
      }

      .menu-dock {
        position: fixed;
        right: 16px;
        bottom: calc(var(--safe-bottom) + 16px);
        z-index: 30;
      }

      .menu-button {
        appearance: none;
        border: 1px solid var(--line);
        width: 44px;
        height: 44px;
        padding: 0;
        border-radius: 999px;
        background: rgba(252, 253, 253, 0.72);
        color: var(--text);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .menu-icon {
        display: inline-grid;
        gap: 4px;
      }

      .menu-icon span {
        display: block;
        width: 14px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.88;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .sheet-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(31, 37, 44, 0.14);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        z-index: 39;
      }

      .sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 40;
        background: var(--surface-strong);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        padding: 10px 16px calc(var(--safe-bottom) + 18px);
        transform: translateY(calc(100% + 20px));
        transition: transform 220ms ease;
        box-shadow: 0 -18px 40px rgba(49, 58, 68, 0.1);
        max-height: min(82vh, 760px);
        overflow-y: auto;
      }

      body.sheet-open .sheet-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      body.sheet-open .sheet {
        transform: translateY(0);
      }

      .sheet-handle {
        width: 36px;
        height: 4px;
        border-radius: 999px;
        background: rgba(83, 94, 106, 0.18);
        margin: 2px auto 14px;
      }

      .sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 16px;
      }

      .sheet-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
      }

      .sheet-sub {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .sheet-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 0;
        cursor: pointer;
      }

      .sheet-section {
        display: grid;
        gap: 12px;
        margin-bottom: 22px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .section-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .clear-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 0;
        cursor: pointer;
        font-size: 0.84rem;
      }

      .open-button {
        appearance: none;
        border: 1px solid var(--line-strong);
        background: rgba(252, 253, 253, 0.74);
        color: var(--text);
        min-height: 52px;
        width: 100%;
        border-radius: 16px;
        cursor: pointer;
      }

      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .meta-pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(252, 253, 253, 0.5);
        color: var(--muted);
        font-size: 0.8rem;
      }

      .empty-copy {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }

      .document-list,
      .toc-list {
        display: grid;
        gap: 2px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .document-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 14px 2px;
        border-bottom: 1px solid var(--line);
      }

      .document-row:last-child {
        border-bottom: 0;
      }

      .document-main {
        min-width: 0;
        cursor: pointer;
      }

      .document-title {
        margin: 0;
        font-size: 0.97rem;
        font-weight: 600;
        letter-spacing: -0.015em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .document-meta {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .document-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .row-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 6px 4px;
        cursor: pointer;
        font-size: 0.84rem;
      }

      .toc-link {
        appearance: none;
        border: 0;
        background: transparent;
        width: 100%;
        text-align: left;
        padding: 12px 2px;
        color: var(--text);
        border-bottom: 1px solid var(--line);
      }

      .toc-link:last-child {
        border-bottom: 0;
      }

      .toc-link small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
      }

      .hidden-input {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <main class="main">
        <article class="article">
          <div class="prose" id="prose" hidden></div>
        </article>
      </main>
    </div>

    <div class="menu-dock">
      <button class="menu-button" id="menuButton" type="button" aria-label="Open menu">
        <span class="menu-icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
        <span class="visually-hidden">Menu</span>
      </button>
    </div>

    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <aside class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <p class="sheet-title">Menu</p>
          <p class="sheet-sub" id="sheetSub"></p>
        </div>
        <button class="sheet-button" id="sheetDoneButton" type="button">Done</button>
      </div>

      <section class="sheet-section">
        <p class="section-label">Open</p>
        <button class="open-button" id="sheetOpenButton" type="button">Choose markdown</button>
        <div class="meta">
          <span class="meta-pill" id="fileNamePill">No file loaded</span>
          <span class="meta-pill" id="wordCountPill">0 words</span>
        </div>
      </section>

      <section class="sheet-section">
        <div class="section-head">
          <p class="section-label">Saved locally</p>
          <button class="clear-button" id="sheetClearButton" type="button">Clear</button>
        </div>
        <div class="document-list" id="sheetList"></div>
        <p class="empty-copy" id="sheetEmpty">No saved files yet.</p>
      </section>

      <section class="sheet-section">
        <p class="section-label">Table of contents</p>
        <div class="toc-list" id="tocList"></div>
        <p class="empty-copy" id="tocEmpty">No headings yet.</p>
      </section>
    </aside>

    <input class="hidden-input" id="fileInput" type="file" accept=".md,.markdown,text/markdown" />

    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

      const STORAGE_LIBRARY = "azi-reader-library";
      const STORAGE_LAST = "azi-reader-last-document";

      const fileInput = document.getElementById("fileInput");
      const menuButton = document.getElementById("menuButton");
      const sheetBackdrop = document.getElementById("sheetBackdrop");
      const sheetDoneButton = document.getElementById("sheetDoneButton");
      const sheetOpenButton = document.getElementById("sheetOpenButton");
      const sheetClearButton = document.getElementById("sheetClearButton");
      const fileNamePill = document.getElementById("fileNamePill");
      const wordCountPill = document.getElementById("wordCountPill");
      const sheetList = document.getElementById("sheetList");
      const sheetEmpty = document.getElementById("sheetEmpty");
      const sheetSub = document.getElementById("sheetSub");
      const tocList = document.getElementById("tocList");
      const tocEmpty = document.getElementById("tocEmpty");
      const prose = document.getElementById("prose");

      let currentDocumentId = null;

      marked.setOptions({
        breaks: false,
        gfm: true,
      });

      function getLibrary() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_LIBRARY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function setLibrary(documents) {
        localStorage.setItem(STORAGE_LIBRARY, JSON.stringify(documents));
      }

      function setCurrentDocument(id) {
        currentDocumentId = id;

        if (id) {
          localStorage.setItem(STORAGE_LAST, id);
        } else {
          localStorage.removeItem(STORAGE_LAST);
        }
      }

      function countWords(text) {
        return text.trim() ? text.trim().split(/\s+/).length : 0;
      }

      function extractTitle(markdown, fallback) {
        const match = markdown.match(/^#\s+(.+)$/m);
        return match?.[1]?.trim() || fallback;
      }

      function formatUpdatedAt(value) {
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function slugify(text) {
        return text
          .toLowerCase()
          .trim()
          .replace(/[^\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-");
      }

      function setSheetOpen(open) {
        document.body.classList.toggle("sheet-open", open);
      }

      function openPicker() {
        fileInput.click();
      }

      function resetReaderState() {
        prose.hidden = true;
        prose.innerHTML = "";
        document.title = "Azi Reader";
        fileNamePill.textContent = "No file loaded";
        wordCountPill.textContent = "0 words";
        sheetSub.textContent = "";
        tocList.innerHTML = "";
        tocList.hidden = true;
        tocEmpty.hidden = false;
      }

      function buildToc() {
        const headings = Array.from(prose.querySelectorAll("h1, h2, h3"));

        if (!headings.length) {
          tocList.innerHTML = "";
          tocList.hidden = true;
          tocEmpty.hidden = false;
          return;
        }

        tocList.innerHTML = "";
        tocList.hidden = false;
        tocEmpty.hidden = true;

        headings.forEach((heading) => {
          const id = slugify(heading.textContent || "section");
          heading.id = heading.id || id;

          const button = document.createElement("button");
          button.className = "toc-link";
          button.type = "button";
          button.innerHTML = `${heading.textContent || "Section"}<small>${heading.tagName.toLowerCase()}</small>`;
          button.style.paddingLeft =
            heading.tagName === "H3" ? "18px" : heading.tagName === "H2" ? "10px" : "2px";
          button.addEventListener("click", () => {
            setSheetOpen(false);
            requestAnimationFrame(() => {
              document.getElementById(heading.id)?.scrollIntoView({ behavior: "smooth", block: "start" });
            });
          });
          tocList.appendChild(button);
        });
      }

      function createRow(documentItem) {
        const row = document.createElement("div");
        row.className = "document-row";

        const main = document.createElement("div");
        main.className = "document-main";
        main.addEventListener("click", () => {
          renderMarkdown(documentItem.content, documentItem.fileName, documentItem.id, false);
          setSheetOpen(false);
        });

        const title = document.createElement("p");
        title.className = "document-title";
        title.textContent = documentItem.title || documentItem.fileName;

        const meta = document.createElement("p");
        meta.className = "document-meta";
        meta.textContent = `${documentItem.wordCount} words · ${formatUpdatedAt(documentItem.updatedAt)}`;

        const actions = document.createElement("div");
        actions.className = "document-actions";

        const openButton = document.createElement("button");
        openButton.className = "row-button";
        openButton.type = "button";
        openButton.textContent = "Open";
        openButton.addEventListener("click", () => {
          renderMarkdown(documentItem.content, documentItem.fileName, documentItem.id, false);
          setSheetOpen(false);
        });

        const deleteButton = document.createElement("button");
        deleteButton.className = "row-button";
        deleteButton.type = "button";
        deleteButton.textContent = "Delete";
        deleteButton.addEventListener("click", () => {
          deleteDocument(documentItem.id);
        });

        main.append(title, meta);
        actions.append(openButton, deleteButton);
        row.append(main, actions);

        return row;
      }

      function renderLibrary() {
        const documents = getLibrary();
        sheetList.innerHTML = "";

        documents.forEach((documentItem) => {
          sheetList.append(createRow(documentItem));
        });

        const hasDocuments = documents.length > 0;
        sheetList.hidden = !hasDocuments;
        sheetEmpty.hidden = hasDocuments;
        sheetClearButton.hidden = !hasDocuments;
        sheetSub.textContent = hasDocuments ? `${documents.length} saved` : "";
      }

      function upsertDocument(fileName, markdown, preferredId = null) {
        const documents = getLibrary();
        const existingIndex = documents.findIndex((documentItem) => {
          if (preferredId && documentItem.id === preferredId) {
            return true;
          }

          return documentItem.fileName === fileName && documentItem.content === markdown;
        });

        const nextDocument = {
          id: preferredId || documents[existingIndex]?.id || `doc-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          fileName: fileName || "Untitled document",
          title: extractTitle(markdown, fileName || "Untitled document"),
          content: markdown,
          wordCount: countWords(markdown),
          updatedAt: new Date().toISOString(),
        };

        if (existingIndex >= 0) {
          documents.splice(existingIndex, 1);
        }

        documents.unshift(nextDocument);
        setLibrary(documents.slice(0, 24));
        setCurrentDocument(nextDocument.id);
        renderLibrary();
        return nextDocument.id;
      }

      function deleteDocument(id) {
        const nextDocuments = getLibrary().filter((documentItem) => documentItem.id !== id);
        setLibrary(nextDocuments);

        if (currentDocumentId === id) {
          setCurrentDocument(null);
          resetReaderState();
          renderLibrary();
          return;
        }

        renderLibrary();
      }

      function renderMarkdown(markdown, fileName, documentId = null, shouldPersist = true) {
        prose.innerHTML = marked.parse(markdown);
        prose.hidden = false;

        const words = countWords(markdown);
        document.title = `${extractTitle(markdown, fileName || "Untitled document")} — Azi Reader`;
        fileNamePill.textContent = fileName || "Untitled";
        wordCountPill.textContent = `${words} words`;
        buildToc();

        if (shouldPersist) {
          setCurrentDocument(upsertDocument(fileName || "Untitled document", markdown, documentId));
        } else {
          setCurrentDocument(documentId);
          renderLibrary();
        }
      }

      async function readFile(file) {
        const text = await file.text();
        renderMarkdown(text, file.name);
      }

      function clearAllDocuments() {
        setLibrary([]);
        setCurrentDocument(null);
        resetReaderState();
        renderLibrary();
        setSheetOpen(false);
      }

      menuButton.addEventListener("click", () => {
        setSheetOpen(true);
      });

      [sheetBackdrop, sheetDoneButton].forEach((element) => {
        element.addEventListener("click", () => {
          setSheetOpen(false);
        });
      });

      sheetOpenButton.addEventListener("click", openPicker);
      sheetClearButton.addEventListener("click", clearAllDocuments);

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];

        if (!file) {
          return;
        }

        await readFile(file);
        fileInput.value = "";
        setSheetOpen(false);
      });

      resetReaderState();
      renderLibrary();

      const lastDocumentId = localStorage.getItem(STORAGE_LAST);
      const lastDocument = getLibrary().find((documentItem) => documentItem.id === lastDocumentId);

      if (lastDocument) {
        renderMarkdown(lastDocument.content, lastDocument.fileName, lastDocument.id, false);
      }
    </script>
  </body>
</html>
