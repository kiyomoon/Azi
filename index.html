<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Azi Reader</title>
    <style>
      :root {
        --bg: #f7f3ec;
        --bg-strong: #fcfaf6;
        --surface: rgba(255, 253, 248, 0.9);
        --surface-strong: rgba(255, 255, 255, 0.94);
        --line: rgba(73, 57, 41, 0.12);
        --line-strong: rgba(73, 57, 41, 0.2);
        --text: #231d17;
        --muted: #77695d;
        --accent: #8b684b;
        --quote: #efe5d8;
        --code: #2f3a45;
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        --font-serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
        --prose-font: var(--font-sans);
        --prose-size: 1.0625rem;
        --prose-line-height: 1.78;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        -webkit-text-size-adjust: 100%;
      }

      body {
        background:
          radial-gradient(circle at top, rgba(197, 176, 151, 0.16), transparent 34%),
          linear-gradient(180deg, #faf7f2 0%, var(--bg) 100%);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body.font-serif {
        --prose-font: var(--font-serif);
        --prose-size: 1.125rem;
        --prose-line-height: 1.74;
      }

      body.zen-mode {
        background: var(--bg-strong);
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      .app {
        min-height: 100vh;
        padding: calc(var(--safe-top) + 4px) 0 calc(var(--safe-bottom) + 82px);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 14px 10px;
        background: linear-gradient(180deg, rgba(250, 247, 242, 0.95), rgba(250, 247, 242, 0.78));
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(73, 57, 41, 0.08);
      }

      body.zen-mode .topbar,
      body.zen-mode .bottombar {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px);
      }

      .nav-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--text);
        padding: 8px 6px;
        border-radius: 999px;
        cursor: pointer;
        min-width: 48px;
      }

      .nav-label {
        font-size: 0.93rem;
      }

      .nav-plus {
        font-size: 1.35rem;
        line-height: 1;
      }

      .titlebox {
        min-width: 0;
        flex: 1;
        text-align: center;
        padding: 0 8px;
      }

      .titlebox p {
        margin: 0;
      }

      .title-main {
        font-size: 0.96rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .title-sub {
        color: var(--muted);
        font-size: 0.76rem;
        margin-top: 2px;
      }

      .main {
        padding: 14px 16px 0;
      }

      .home {
        display: grid;
        gap: 20px;
        padding-top: 10px;
      }

      body.reading-mode .home {
        display: none;
      }

      .open-button {
        appearance: none;
        border: 1px solid var(--line-strong);
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        min-height: 54px;
        width: 100%;
        border-radius: 18px;
        cursor: pointer;
      }

      .section {
        display: grid;
        gap: 10px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .section-label {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .clear-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 0;
        cursor: pointer;
        font-size: 0.84rem;
      }

      .document-list {
        display: grid;
        gap: 2px;
        border-top: 1px solid rgba(73, 57, 41, 0.08);
        border-bottom: 1px solid rgba(73, 57, 41, 0.08);
      }

      .document-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 14px 2px;
        border-bottom: 1px solid rgba(73, 57, 41, 0.08);
      }

      .document-row:last-child {
        border-bottom: 0;
      }

      .document-main {
        min-width: 0;
        cursor: pointer;
      }

      .document-title {
        margin: 0;
        font-size: 0.97rem;
        font-weight: 600;
        letter-spacing: -0.015em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .document-meta {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .document-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .row-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 6px 4px;
        cursor: pointer;
        font-size: 0.84rem;
      }

      .empty-copy {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.7;
        padding-top: 4px;
      }

      .reader {
        display: none;
      }

      body.reading-mode .reader {
        display: block;
      }

      .article {
        padding: 10px 0 96px;
      }

      body.zen-mode .article {
        padding-top: 18px;
        padding-bottom: calc(var(--safe-bottom) + 30px);
      }

      .prose {
        font-family: var(--prose-font);
      }

      .prose > :first-child {
        margin-top: 0;
      }

      .prose h1,
      .prose h2,
      .prose h3,
      .prose h4 {
        font-family: var(--font-serif);
        color: #241d17;
        font-weight: 500;
        letter-spacing: -0.02em;
      }

      .prose h1 {
        font-size: 1.82rem;
        line-height: 1.04;
        margin: 0 0 18px;
      }

      .prose h2 {
        font-size: 1.34rem;
        line-height: 1.08;
        margin: 34px 0 14px;
      }

      .prose h3 {
        font-size: 1.1rem;
        margin: 24px 0 10px;
      }

      .prose p,
      .prose li {
        font-size: var(--prose-size);
        line-height: var(--prose-line-height);
        color: #40362d;
        letter-spacing: -0.003em;
      }

      .prose p,
      .prose ul,
      .prose ol,
      .prose blockquote,
      .prose pre {
        margin: 0 0 16px;
      }

      .prose ul,
      .prose ol {
        padding-left: 1.28rem;
      }

      .prose li + li {
        margin-top: 8px;
      }

      .prose a {
        color: var(--accent);
        text-decoration-color: rgba(139, 104, 75, 0.36);
        text-underline-offset: 0.18em;
      }

      .prose strong {
        color: #231d16;
      }

      .prose hr {
        border: 0;
        height: 1px;
        background: var(--line);
        margin: 30px 0;
      }

      .prose blockquote {
        border-left: 3px solid rgba(139, 104, 75, 0.24);
        border-radius: 0 14px 14px 0;
        background: var(--quote);
        padding: 12px 14px;
      }

      .prose code {
        font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        background: rgba(47, 58, 69, 0.08);
        color: var(--code);
        border-radius: 8px;
        padding: 0.14em 0.36em;
      }

      .prose pre {
        overflow-x: auto;
        padding: 14px;
        border-radius: 16px;
        background: #1f252d;
        color: #eef2f7;
      }

      .prose pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .prose img {
        max-width: 100%;
        display: block;
        margin: 20px auto;
        border-radius: 16px;
      }

      .bottombar {
        position: fixed;
        left: 50%;
        bottom: calc(var(--safe-bottom) + 8px);
        transform: translateX(-50%);
        width: calc(100vw - 16px);
        display: flex;
        gap: 8px;
        padding: 7px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 252, 246, 0.9);
        backdrop-filter: blur(18px);
        box-shadow: 0 12px 26px rgba(60, 46, 34, 0.1);
        z-index: 25;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      body:not(.reading-mode) .bottombar {
        display: none;
      }

      .dock-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--text);
        flex: 1;
        min-height: 40px;
        border-radius: 16px;
        cursor: pointer;
      }

      .dock-button.active {
        background: rgba(139, 104, 75, 0.1);
      }

      .zen-exit {
        position: fixed;
        right: 12px;
        top: calc(var(--safe-top) + 10px);
        z-index: 35;
        appearance: none;
        border: 1px solid var(--line);
        background: rgba(255, 252, 246, 0.9);
        color: var(--text);
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        backdrop-filter: blur(16px);
        display: none;
      }

      body.zen-mode .zen-exit {
        display: inline-flex;
        align-items: center;
      }

      .sheet-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(24, 18, 14, 0.2);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
        z-index: 40;
      }

      .sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 41;
        background: var(--surface-strong);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        padding: 10px 16px calc(var(--safe-bottom) + 18px);
        transform: translateY(calc(100% + 20px));
        transition: transform 220ms ease;
        box-shadow: 0 -18px 40px rgba(44, 33, 24, 0.12);
      }

      body.sheet-open .sheet-backdrop {
        opacity: 1;
        pointer-events: auto;
      }

      body.sheet-open .sheet {
        transform: translateY(0);
      }

      .sheet-handle {
        width: 36px;
        height: 4px;
        border-radius: 999px;
        background: rgba(73, 57, 41, 0.14);
        margin: 2px auto 14px;
      }

      .sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 14px;
      }

      .sheet-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
      }

      .sheet-sub {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 0.8rem;
      }

      .sheet-actions {
        display: flex;
        gap: 10px;
      }

      .sheet-button {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 0;
        cursor: pointer;
      }

      .sheet-open-button {
        appearance: none;
        width: 100%;
        min-height: 50px;
        border-radius: 16px;
        border: 1px solid var(--line-strong);
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
        cursor: pointer;
        margin-top: 16px;
      }

      .hidden-input {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <button class="nav-button nav-label" id="filesButton" type="button">Files</button>
        <div class="titlebox">
          <p class="title-main" id="titleMain">Azi Reader</p>
          <p class="title-sub" id="titleSub"></p>
        </div>
        <button class="nav-button nav-plus" id="openButton" type="button">+</button>
      </header>

      <main class="main">
        <section class="home" id="home">
          <button class="open-button" id="homeOpenButton" type="button">Open markdown</button>

          <section class="section">
            <div class="section-head">
              <p class="section-label">Saved locally</p>
              <button class="clear-button" id="homeClearButton" type="button">Clear</button>
            </div>
            <div class="document-list" id="homeList"></div>
            <p class="empty-copy" id="homeEmpty">No saved files yet.</p>
          </section>
        </section>

        <section class="reader">
          <article class="article">
            <div class="prose" id="prose"></div>
          </article>
        </section>
      </main>
    </div>

    <div class="bottombar">
      <button class="dock-button" id="dockFilesButton" type="button">Files</button>
      <button class="dock-button" id="dockFontButton" type="button">Sans</button>
      <button class="dock-button" id="dockZenButton" type="button">Zen</button>
      <button class="dock-button" id="dockOpenButton" type="button">Open</button>
    </div>

    <button class="zen-exit" id="zenExitButton" type="button">Done</button>

    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <aside class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <div>
          <p class="sheet-title">Files</p>
          <p class="sheet-sub" id="sheetSub"></p>
        </div>
        <div class="sheet-actions">
          <button class="sheet-button" id="sheetClearButton" type="button">Clear</button>
          <button class="sheet-button" id="sheetDoneButton" type="button">Done</button>
        </div>
      </div>
      <div class="document-list" id="sheetList"></div>
      <p class="empty-copy" id="sheetEmpty">No saved files yet.</p>
      <button class="sheet-open-button" id="sheetOpenButton" type="button">Open markdown</button>
    </aside>

    <input class="hidden-input" id="fileInput" type="file" accept=".md,.markdown,text/markdown" />

    <script type="module">
      import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

      const STORAGE_LIBRARY = "azi-reader-library";
      const STORAGE_LAST = "azi-reader-last-document";
      const STORAGE_FONT = "azi-reader-font-mobile";
      const STORAGE_ZEN = "azi-reader-zen-mobile";

      const fileInput = document.getElementById("fileInput");
      const filesButton = document.getElementById("filesButton");
      const openButton = document.getElementById("openButton");
      const homeOpenButton = document.getElementById("homeOpenButton");
      const homeClearButton = document.getElementById("homeClearButton");
      const dockFilesButton = document.getElementById("dockFilesButton");
      const dockFontButton = document.getElementById("dockFontButton");
      const dockZenButton = document.getElementById("dockZenButton");
      const dockOpenButton = document.getElementById("dockOpenButton");
      const zenExitButton = document.getElementById("zenExitButton");
      const sheetBackdrop = document.getElementById("sheetBackdrop");
      const sheetDoneButton = document.getElementById("sheetDoneButton");
      const sheetOpenButton = document.getElementById("sheetOpenButton");
      const sheetClearButton = document.getElementById("sheetClearButton");
      const titleMain = document.getElementById("titleMain");
      const titleSub = document.getElementById("titleSub");
      const homeList = document.getElementById("homeList");
      const homeEmpty = document.getElementById("homeEmpty");
      const sheetList = document.getElementById("sheetList");
      const sheetEmpty = document.getElementById("sheetEmpty");
      const sheetSub = document.getElementById("sheetSub");
      const prose = document.getElementById("prose");

      let currentDocumentId = null;

      marked.setOptions({
        breaks: false,
        gfm: true,
      });

      function getLibrary() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_LIBRARY) || "[]");
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function setLibrary(documents) {
        localStorage.setItem(STORAGE_LIBRARY, JSON.stringify(documents));
      }

      function setCurrentDocument(id) {
        currentDocumentId = id;

        if (id) {
          localStorage.setItem(STORAGE_LAST, id);
        } else {
          localStorage.removeItem(STORAGE_LAST);
        }
      }

      function countWords(text) {
        return text.trim() ? text.trim().split(/\s+/).length : 0;
      }

      function extractTitle(markdown, fallback) {
        const match = markdown.match(/^#\s+(.+)$/m);
        return match?.[1]?.trim() || fallback;
      }

      function formatUpdatedAt(value) {
        return new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        }).format(new Date(value));
      }

      function openPicker() {
        fileInput.click();
      }

      function setSheetOpen(open) {
        document.body.classList.toggle("sheet-open", open);
      }

      function setZenMode(enabled) {
        document.body.classList.toggle("zen-mode", enabled);
        localStorage.setItem(STORAGE_ZEN, enabled ? "1" : "0");
      }

      function setFontMode(mode) {
        const normalized = mode === "serif" ? "serif" : "sans";
        document.body.classList.toggle("font-serif", normalized === "serif");
        localStorage.setItem(STORAGE_FONT, normalized);
        dockFontButton.textContent = normalized === "serif" ? "Serif" : "Sans";
      }

      function clearReader() {
        prose.innerHTML = "";
        document.body.classList.remove("reading-mode");
        setZenMode(false);
        setCurrentDocument(null);
        titleMain.textContent = "Azi Reader";
        titleSub.textContent = "";
        renderLibrary();
      }

      function updateHeader(title, subtitle = "") {
        titleMain.textContent = title;
        titleSub.textContent = subtitle;
      }

      function createRow(documentItem) {
        const row = document.createElement("div");
        row.className = "document-row";

        const main = document.createElement("div");
        main.className = "document-main";
        main.addEventListener("click", () => {
          renderMarkdown(documentItem.content, documentItem.fileName, documentItem.id, false);
          setSheetOpen(false);
        });

        const title = document.createElement("p");
        title.className = "document-title";
        title.textContent = documentItem.title || documentItem.fileName;

        const meta = document.createElement("p");
        meta.className = "document-meta";
        meta.textContent = `${documentItem.wordCount} words · ${formatUpdatedAt(documentItem.updatedAt)}`;

        const actions = document.createElement("div");
        actions.className = "document-actions";

        const openButton = document.createElement("button");
        openButton.className = "row-button";
        openButton.type = "button";
        openButton.textContent = "Open";
        openButton.addEventListener("click", () => {
          renderMarkdown(documentItem.content, documentItem.fileName, documentItem.id, false);
          setSheetOpen(false);
        });

        const deleteButton = document.createElement("button");
        deleteButton.className = "row-button";
        deleteButton.type = "button";
        deleteButton.textContent = "Delete";
        deleteButton.addEventListener("click", () => {
          deleteDocument(documentItem.id);
        });

        main.append(title, meta);
        actions.append(openButton, deleteButton);
        row.append(main, actions);

        return row;
      }

      function renderLibrary() {
        const documents = getLibrary();

        homeList.innerHTML = "";
        sheetList.innerHTML = "";

        documents.forEach((documentItem) => {
          homeList.append(createRow(documentItem));
          sheetList.append(createRow(documentItem));
        });

        const hasDocuments = documents.length > 0;
        homeList.hidden = !hasDocuments;
        sheetList.hidden = !hasDocuments;
        homeEmpty.hidden = hasDocuments;
        sheetEmpty.hidden = hasDocuments;
        homeClearButton.hidden = !hasDocuments;
        sheetClearButton.hidden = !hasDocuments;
        sheetSub.textContent = hasDocuments ? `${documents.length} saved` : "";
      }

      function upsertDocument(fileName, markdown, preferredId = null) {
        const documents = getLibrary();
        const existingIndex = documents.findIndex((documentItem) => {
          if (preferredId && documentItem.id === preferredId) {
            return true;
          }

          return documentItem.fileName === fileName && documentItem.content === markdown;
        });

        const nextDocument = {
          id: preferredId || documents[existingIndex]?.id || `doc-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          fileName: fileName || "Untitled document",
          title: extractTitle(markdown, fileName || "Untitled document"),
          content: markdown,
          wordCount: countWords(markdown),
          updatedAt: new Date().toISOString(),
        };

        if (existingIndex >= 0) {
          documents.splice(existingIndex, 1);
        }

        documents.unshift(nextDocument);
        setLibrary(documents.slice(0, 24));
        setCurrentDocument(nextDocument.id);
        renderLibrary();
        return nextDocument.id;
      }

      function deleteDocument(id) {
        const nextDocuments = getLibrary().filter((documentItem) => documentItem.id !== id);
        setLibrary(nextDocuments);

        if (currentDocumentId === id) {
          clearReader();
          return;
        }

        renderLibrary();
      }

      function renderMarkdown(markdown, fileName, documentId = null, shouldPersist = true) {
        prose.innerHTML = marked.parse(markdown);
        document.body.classList.add("reading-mode");

        const words = countWords(markdown);
        updateHeader(extractTitle(markdown, fileName || "Untitled document"), `${words} words`);

        if (shouldPersist) {
          setCurrentDocument(upsertDocument(fileName || "Untitled document", markdown, documentId));
        } else {
          setCurrentDocument(documentId);
          renderLibrary();
        }
      }

      async function readFile(file) {
        const text = await file.text();
        renderMarkdown(text, file.name);
      }

      function clearAllDocuments() {
        setLibrary([]);
        clearReader();
        renderLibrary();
        setSheetOpen(false);
      }

      [filesButton, dockFilesButton].forEach((button) => {
        button.addEventListener("click", () => {
          setSheetOpen(true);
        });
      });

      [openButton, homeOpenButton, dockOpenButton, sheetOpenButton].forEach((button) => {
        button.addEventListener("click", openPicker);
      });

      [homeClearButton, sheetClearButton].forEach((button) => {
        button.addEventListener("click", clearAllDocuments);
      });

      [sheetBackdrop, sheetDoneButton].forEach((element) => {
        element.addEventListener("click", () => setSheetOpen(false));
      });

      dockFontButton.addEventListener("click", () => {
        setFontMode(document.body.classList.contains("font-serif") ? "sans" : "serif");
      });

      dockZenButton.addEventListener("click", () => {
        setZenMode(!document.body.classList.contains("zen-mode"));
      });

      zenExitButton.addEventListener("click", () => {
        setZenMode(false);
      });

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];

        if (!file) {
          return;
        }

        await readFile(file);
        fileInput.value = "";
        setSheetOpen(false);
      });

      const storedFontMode = localStorage.getItem(STORAGE_FONT);
      const storedZenMode = localStorage.getItem(STORAGE_ZEN);

      setFontMode(storedFontMode === "serif" ? "serif" : "sans");
      setZenMode(storedZenMode === "1");
      renderLibrary();

      const lastDocumentId = localStorage.getItem(STORAGE_LAST);
      const lastDocument = getLibrary().find((documentItem) => documentItem.id === lastDocumentId);

      if (lastDocument) {
        renderMarkdown(lastDocument.content, lastDocument.fileName, lastDocument.id, false);
      }
    </script>
  </body>
</html>
